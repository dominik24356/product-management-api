services:
  db:
    image: postgres:16-alpine
    container_name: productapi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-productdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-productdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: productapi-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-productdb}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-min-256-bits-long-key}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
    name: productapi-postgres-data