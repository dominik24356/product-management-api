services:
  db:
    image: postgres:16-alpine
    container_name: productapi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-productdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-productdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: productapi-postgres-data